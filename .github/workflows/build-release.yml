name: Build & Release Windows Installers

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Job 1: Build Python backend → main.exe ──────────────────────
  build-backend:
    name: Build Backend (.exe)
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'kashikart/kashikart/Kahiskart-0.0.7-kashikart/requirements.txt'

      - name: Install Python dependencies
        working-directory: kashikart/kashikart/Kahiskart-0.0.7-kashikart
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.11.0

      - name: Create production .env
        working-directory: kashikart/kashikart/Kahiskart-0.0.7-kashikart
        shell: bash
        run: |
          cat > .env << 'EOF'
          DATABASE_URL=sqlite+aiosqlite:///./tender_dev.db
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          ALGORITHM=HS256
          ACCESS_TOKEN_EXPIRE_MINUTES=60
          REFRESH_TOKEN_EXPIRE_DAYS=7
          SMTP_HOST=smtp.gmail.com
          SMTP_PORT=587
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM_EMAIL=${{ secrets.SMTP_FROM_EMAIL }}
          APP_ENV=production
          DEBUG=false
          EOF

      - name: Build with PyInstaller
        working-directory: kashikart/kashikart/Kahiskart-0.0.7-kashikart
        run: pyinstaller main.spec

      - name: Verify build output
        working-directory: kashikart/kashikart/Kahiskart-0.0.7-kashikart
        run: |
          if (Test-Path "dist\main\main.exe") {
            Write-Host "✅ main.exe built successfully"
            Get-Item "dist\main\main.exe" | Select-Object Name, Length
          } else {
            Write-Host "❌ Build failed — main.exe not found"
            exit 1
          }

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: kashikart-backend-${{ github.ref_name }}
          path: kashikart/kashikart/Kahiskart-0.0.7-kashikart/dist/main/
          retention-days: 30

  # ── Job 2: Build React/Electron frontend → installer .exe ───────
  build-frontend:
    name: Build Frontend Installer (.exe)
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'kashikart/kashikart/kashikart-gaurav/package-lock.json'

      - name: Install Node dependencies
        working-directory: kashikart/kashikart/kashikart-gaurav
        run: npm ci

      - name: Build with Electron Builder
        working-directory: kashikart/kashikart/kashikart-gaurav
        run: npm run dist
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Verify installer output
        working-directory: kashikart/kashikart/kashikart-gaurav
        run: |
          $installer = Get-ChildItem -Path "release" -Filter "*.exe" | Select-Object -First 1
          if ($installer) {
            Write-Host "✅ Installer built: $($installer.Name)"
          } else {
            Write-Host "❌ No .exe found in release/"
            exit 1
          }

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: kashikart-frontend-${{ github.ref_name }}
          path: kashikart/kashikart/kashikart-gaurav/release/*.exe
          retention-days: 30

  # ── Job 3: Create GitHub Release (on version tags only) ─────────
  create-release:
    name: Create GitHub Release
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: kashikart-backend-${{ github.ref_name }}
          path: artifacts/backend/

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: kashikart-frontend-${{ github.ref_name }}
          path: artifacts/frontend/

      - name: Zip backend
        run: |
          cd artifacts
          zip -r KashiKart-Backend-${{ github.ref_name }}.zip backend/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: KashiKart ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            ## KashiKart ${{ github.ref_name }} — Windows Release

            | File | Description |
            |------|-------------|
            | `KashiKart-Backend-*.zip` | Extract and run `main.exe` first |
            | `Kashikart Frontend Setup *.exe` | Windows installer for the UI |

            **Installation:** Start `main.exe` (backend) first, then run the frontend installer.
          files: |
            artifacts/KashiKart-Backend-${{ github.ref_name }}.zip
            artifacts/frontend/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
