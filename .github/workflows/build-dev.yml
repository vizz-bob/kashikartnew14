name: Dev Build Check

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  lint-backend:
    name: Check Backend (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Check Python syntax
        working-directory: kashikart/kashikart/Kahiskart-0.0.7-kashikart
        run: |
          python -m py_compile app/main.py
          echo "✅ Backend syntax OK"

  lint-frontend:
    name: Check Frontend (Node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'kashikart/kashikart/kashikart-gaurav/package-lock.json'
      - name: Install dependencies
        working-directory: kashikart/kashikart/kashikart-gaurav
        run: npm ci
      - name: Build React app
        working-directory: kashikart/kashikart/kashikart-gaurav
        run: npm run build
      - name: Verify dist
        working-directory: kashikart/kashikart/kashikart-gaurav
        run: |
          [ -f dist/index.html ] && echo "✅ Frontend build OK" || (echo "❌ Build failed" && exit 1)
