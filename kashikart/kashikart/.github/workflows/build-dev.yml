name: Dev Build Check

# ─────────────────────────────────────────────────────────────────
# Runs on every push to main/develop and on pull requests.
# Does NOT create a release — just validates the build passes.
# ─────────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  # ── Quick syntax + import check for backend ──────────────────────
  lint-backend:
    name: Lint Backend (Python)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install lint tools
        run: pip install flake8 --break-system-packages 2>/dev/null || pip install flake8

      - name: Check Python syntax
        working-directory: Kahiskart-0.0.7-kashikart
        run: |
          python -m py_compile app/main.py
          echo "✅ Backend syntax check passed"

  # ── Quick build check for frontend ───────────────────────────────
  lint-frontend:
    name: Lint Frontend (Node)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'kashikart-gaurav/package-lock.json'

      - name: Install dependencies
        working-directory: kashikart-gaurav
        run: npm ci

      - name: Build React app
        working-directory: kashikart-gaurav
        run: npm run build

      - name: Lint check
        working-directory: kashikart-gaurav
        run: npm run lint
        continue-on-error: true   # Don't fail CI on lint warnings

      - name: Verify dist output
        working-directory: kashikart-gaurav
        run: |
          if [ -f "dist/index.html" ]; then
            echo "✅ Frontend build passed"
          else
            echo "❌ dist/index.html not found"
            exit 1
          fi
